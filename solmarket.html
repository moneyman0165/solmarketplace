// ── MATRIX RAIN CANVAS ───────────────────────────────────────────────────────
function MatrixRain() {
const canvasRef = useRef(null);
useEffect(() => {
const canvas = canvasRef.current;
if (!canvas) return;
const ctx = canvas.getContext(“2d”);
canvas.width = canvas.offsetWidth;
canvas.height = canvas.offsetHeight;
const cols = Math.floor(canvas.width / 16);
const drops = Array(cols).fill(1);
const chars = “SOLANAVERIFYLISTLIQUIDITYMOONDEGENWAGMIJUPITERVOLUMEBOOSTPUMPFUN01”;
const draw = () => {
ctx.fillStyle = “rgba(0,0,0,0.06)”;
ctx.fillRect(0, 0, canvas.width, canvas.height);
ctx.fillStyle = “#00FF41”;
ctx.font = “12px monospace”;
drops.forEach((y, i) => {
const char = chars[Math.floor(Math.random() * chars.length)];
ctx.globalAlpha = Math.random() * 0.5 + 0.1;
ctx.fillText(char, i * 16, y * 16);
if (y * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
drops[i]++;
});
ctx.globalAlpha = 1;
};
const timer = setInterval(draw, 50);
return () => clearInterval(timer);
}, []);
return <canvas ref={canvasRef} style={{ position: “absolute”, inset: 0, width: “100%”, height: “100%”, opacity: 0.15, pointerEvents: “none” }} />;
}

errorMsg: null,
});

          </div>
        : cart.map(item => (

    {cart.length > 0 && (

        <div>
          <div style={{ fontSize: "0.65rem", color: "var(--green-dim)", marginBottom: "0.4rem" }}>PAY_WITH:</div>
          <div className="currency-switch">

            <button className={`currency-opt ${currency === "SOL" ? "active" : ""}`} onClick={() => setCurrency("SOL")}>SOL</button>

        </div>
        <button className="btn-checkout-main" onClick={handleCheckout}>
          🟢 CHECKOUT_WITH_WALLET()
        </button>
      </div>

  </div>

  {/* CHECKOUT MODAL */}
  {checkoutStep === "confirm" && (
    <div className="modal-overlay">
      <div className="modal-box">
        <div className="modal-top">
          <div className="modal-title">CONFIRM_ORDER.EXE</div>
          <button className="cart-close" onClick={() => setCheckoutStep(null)}>✕</button>
        </div>
        <div className="modal-body">
          <div className="confirm-items">
            {cart.map(item => (
              <div key={item.id} className="confirm-item">
                <span>{item.name || item.id.toUpperCase()}</span>
                <span style={{ fontFamily: "var(--pixel)", fontSize: "0.5rem", color: "var(--yellow)" }}>${item.price}</span>
              </div>
            ))}
          </div>
          <div className="confirm-total">
            <span className="confirm-total-label">TOTAL DUE:</span>
            <span className="confirm-total-val">{currency === "SOL" ? `${totalSol} SOL` : `$${total.toLocaleString()} USDC`}</span>
          </div>
          <div className="confirm-actions">
            <button className="btn btn-ghost" style={{ flex: 1, padding: "0.65rem" }} onClick={() => setCheckoutStep(null)}>CANCEL</button>
            <button className="btn btn-green" style={{ flex: 2, padding: "0.65rem" }} onClick={handleApprove}>APPROVE_TX →</button>
          </div>
        </div>
      </div>
    </div>
  )}

  {checkoutStep === "processing" && (
    <div className="modal-overlay">
      <div className="modal-box">
        <div className="modal-top"><div className="modal-title">BROADCASTING...</div></div>
        <div className="modal-body">
          <div className="processing-box">
            <div className="processing-art">
              &gt; SIGNING_TX...<br />
              &gt; SENDING_TO_NETWORK...<br />
              &gt; AWAITING_CONFIRMATION...
            </div>
            <div className="processing-bar"><div className="processing-fill" /></div>
            <div className="processing-sub">&gt; DO NOT CLOSE THIS WINDOW</div>
          </div>
        </div>
      </div>
    </div>
  )}

  {checkoutStep === "success" && (
    <div className="modal-overlay">
      <div className="modal-box">
        <div className="modal-top">
          <div className="modal-title" style={{ color: "var(--green)" }}>TX_CONFIRMED ✓</div>
          <button className="cart-close" onClick={() => { setCheckoutStep(null); setCartOpen(false); }}>✕</button>
        </div>
        <div className="modal-body">
          <div className="success-box">
            <div className="success-ascii">
              ██████╗ ███████╗<br />
              ██╔════╝ ██╔════╝<br />
              ██║  ███╗█████╗<br />
              ██║   ██║██╔══╝<br />
              ╚██████╔╝███████╗<br />
              ╚═════╝ ╚══════╝
            </div>
            <div className="success-title">TRANSACTION CONFIRMED</div>
            <div className="tx-box">
              <div className="tx-label-sm">TX_HASH:</div>
              <div className="tx-val-sm">{txHash}</div>
            </div>
            <div style={{ fontSize: "0.75rem", color: "var(--green-dim)", marginBottom: "1.25rem", lineHeight: "1.8" }}>
              &gt; Services activating...<br />
              &gt; Dashboard ready
            </div>
            <button className="btn btn-green" style={{ width: "100%", padding: "0.75rem" }}
              onClick={() => { setCheckoutStep(null); setCartOpen(false); }}>
              VIEW_DASHBOARD →
            </button>
          </div>
        </div>
      </div>
    </div>
  )}

  {/* WALLET SELECT MODAL */}
  {showWalletModal && (
    <WalletModal
      onSelect={handleConnectWallet}
      onClose={() => {
        if (wallet.status !== "connecting") setShowWalletModal(false);
      }}
      status={wallet.status}
      errorMsg={wallet.errorMsg}
      connecting={wallet.status === "connecting" ? wallet.name : null}
    />
  )}
</>
